          type: integer
        description: Journey ID
      tags:
      - journey-actions
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JourneyActionDetail'
              examples:
                JourneyStartExample:
                  value:
                  - shortId: qwKJ3z9B
                    action: journey_start
                    description: null
                    values: null
                    isAutomatic: false
                    assignees: []
                    parentAction: null
                    journey: 48GX8GYl
                    isConfigured: true
                  summary: journey_start example
                SendSmsExample:
                  value:
                  - shortId: 1YKMe7K5
                    action: send_sms
                    description: Send a welcome sms to traveller
                    values:
                      recipients:
                      - value: '+3546666666'
                      message:
                        value: The message sent
                    isAutomatic: false
                    assignees: []
                    parentAction: qwKJ3z9B
                    journey: 48GX8GYl
                    isConfigured: true
                  summary: send_sms example
          description: ''
        '401':
          description: Unauthorized
