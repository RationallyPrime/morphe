components:
  schemas:
    ActionResult:
      type: object
      properties:
        short_id:
          type: string
          nullable: true
          maxLength: 255
        date_started:
          type: string
          format: date-time
          nullable: true
        date_updated:
          type: string
          format: date-time
          nullable: true
        date_succeeded:
          type: string
          format: date-time
          nullable: true
        date_failed:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ActionResultStatusEnum'
        validation_error:
          type: object
          additionalProperties: {}
          nullable: true
        message:
          type: string
          nullable: true
      required:
      - status
    ActionResultStatusEnum:
      enum:
      - started
      - success
      - error
      type: string
    Company:
      type: object
      properties:
        name:
          type: string
      required:
      - name
    CompanyUser:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        short_id:
          type: string
          readOnly: true
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        is_active:
          type: boolean
          default: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: user
        picture:
          type: string
          format: uri
          nullable: true
        send_invite:
          type: boolean
          writeOnly: true
          default: false
        has_set_password:
          type: boolean
          readOnly: true
        is_me:
          type: string
          readOnly: true
      required:
      - email
      - has_set_password
      - id
      - is_me
      - name
      - short_id
    ConvertedDocument:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    CreateFieldError:
      type: object
      properties:
        journey:
          type: string
        email:
          type: string
      required:
      - email
      - journey
    CreateJourneyActionData:
      oneOf:
      - $ref: '#/components/schemas/JourneyStartData'
      - $ref: '#/components/schemas/SendEmailJourneyData'
      - $ref: '#/components/schemas/SendSMSJourneyData'
      - $ref: '#/components/schemas/WaitForTimeJourneyData'
      - $ref: '#/components/schemas/WaitUntilFixedDateJourneyData'
      - $ref: '#/components/schemas/WaitUntilRelativeDateJourneyData'
    Document:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    DocumentTemplate:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        file:
          type: string
          format: uri
        short_id:
          type: string
          readOnly: true
        field_config:
          type: object
          additionalProperties: {}
          nullable: true
      required:
      - description
      - file
      - name
      - short_id
    EmailTemplate:
      type: object
      properties:
        template_type:
          $ref: '#/components/schemas/TemplateTypeEnum'
        short_id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        subject:
          type: string
          maxLength: 255
        content_html:
          type: string
        container:
          type: string
      required:
      - content_html
      - name
      - short_id
      - subject
    FixedDateJourneyValues:
      type: object
      properties:
        date:
          $ref: '#/components/schemas/JourneyActionValue'
      required:
      - date
    Form:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        fields_config:
          type: object
          additionalProperties: {}
          nullable: true
        is_complete:
          type: boolean
        form_answers:
          type: string
          readOnly: true
      required:
      - form_answers
    FormPublic:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        fields_config:
          type: object
          additionalProperties: {}
          nullable: true
        is_complete:
          type: boolean
    FormTemplate:
      type: object
      properties:
        short_id:
          type: string
          nullable: true
          maxLength: 255
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 255
        status:
          $ref: '#/components/schemas/FormTemplateStatusEnum'
        fields_config:
          type: object
          additionalProperties: {}
          nullable: true
      required:
      - name
    FormTemplateStatusEnum:
      enum:
      - draft
      - active
      - archived
