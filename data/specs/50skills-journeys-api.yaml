openapi: 3.0.3
info:
  title: 50skills Journeys API
  version: 1.0.0
  description: 50skills Journeys API for everyone
paths:
  /v1/company/:
    get:
      operationId: company_retrieve
      description: Retrieve the user's current company
      summary: Retrieve current company
      tags:
      - company
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
              examples:
                Example1:
                  value:
                    name: Shire
                  summary: Example 1
          description: ''
        '401':
          description: Unauthorized
        '404':
          description: Not found
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.get(\n    \"https://journeys.api.50skills.com/v1/company/\"\
          ,\n)\nprint(response.json())\n                    "
    patch:
      operationId: company_partial_update
      description: Edit the company
      summary: Edit company
      tags:
      - company
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCompany'
            examples:
              FullExample:
                value:
                  name: The Shire
                summary: Full example
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
              examples:
                FullExample:
                  value:
                    name: The Shire
                  summary: Full example
          description: ''
        '401':
          description: Unauthorized
        '404':
          description: Not found
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.patch(\n    \"https://journeys.api.50skills.com/v1/company/\"\
          ,\n    json={\n        \"name\": \"The Shire\",\n    }\n)\nprint(response.json())\n\
          \                    "
