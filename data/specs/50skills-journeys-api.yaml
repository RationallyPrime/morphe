      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
              examples:
                UpdateATemplateResponse:
                  value:
                    shortId: 48181eab
                    name: Amazing template
                    subject: Some subject
                    content_html: <p>Some new content</p>
                    container: null
                  summary: Update a template response
          description: ''
        '401':
          description: Unauthorized
        '404':
          description: Not found
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.patch(\n    \"https://journeys.api.50skills.com/v1/email-templates/a48181eab/\"\
          ,\n    json={\n        \"contentHtml\": \"<p>Some new content</p>\",\n \
          \   }\n)\nprint(response.json())\n                    "
