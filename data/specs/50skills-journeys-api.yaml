                  journey: 48GX8GYl
                  description: ''
                  parentAction: null
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values: null
                summary: journey_start create action example
              SendSmsCreateActionExample:
                value:
                  action: send_sms
                  journey: 48GX8GYl
                  description: Send sms to traveller
                  parentAction: 1YKMe7K5
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values:
                    recipients:
                    - value: '+3546666666'
                    message:
                      value: The message sent
                summary: send_sms create action example
              SendEmailCreateActionExample:
                value:
                  action: send_email
                  journey: 48GX8GYl
                  description: Send email to traveller
                  parentAction: 2XYKzl8K6
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values:
                    subject:
                      value: Email subject
                    content:
                      value: <p>This is the email subject </p>
                    from_email:
                      value: no_reply@50skills.com
                    recipients:
                    - value: traveller@50skills.com
                summary: send_email create action example
              WaitForTimeCreateActionExample:
                value:
                  action: wait_for_time
                  journey: 48GX8GYl
                  description: Wait for some time to perform the next action
                  parentAction: 3twsTJ6p
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values:
                    days:
                      value: '7'
                    hours:
                      value: '30'
                    minutes:
                      value: '10'
                summary: wait_for_time create action example
              WaitUntilFixedDateCreateActionExample:
                value:
                  action: wait_until_fixed_date
                  journey: 48GX8GYl
                  description: Wait until a fixed date to perform the next action
                  parentAction: u0jSkPzW
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values:
                    date:
                      value: '2023-04-01'
                    time:
                      value: 09:00
                summary: wait_until_fixed_date create action example
              WaitUntilRelativeDateCreateActionExample:
                value:
                  action: wait_until_relative_date
                  journey: 48GX8GYl
                  description: Wait until a fixed date to perform the next action
                  parentAction: Vmz3kvVX
                  childActions: []
                  isAutomatic: false
                  assignees: []
                  values:
                    reference_date:
                      value: '2023-04-01'
                    comparator:
                      value: gt
                    days:
                    - value: '14'
                    time:
                      value: 09:00
                summary: wait_until_relative_date create action example
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyActionDetail'
              examples:
                SendSmsCreateActionResponseExample:
                  value:
                    shortId: wvy8Myyv
                    action: send_sms
                    journey: 48GX8GYl
                    description: Send sms to traveller
                    parentAction: 1YKMe7K5
                    isAutomatic: false
                    assignees: []
                    values:
                      recipients:
                      - value: '+3546666666'
                      message:
                        value: The message sent
                  summary: send_sms create action response example
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneyActionValidationError'
              examples:
                MissingRequiredFields:
                  value:
                    journey:
                    - This field is required.
                    action:
                    - This field is required.
                    parentAction:
                    - This field is required.
                  summary: Missing required fields
          description: ''
        '401':
          description: Unauthorized
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.post(\n    \"https://journeys.api.50skills.com/v1/journey-actions\"\
          ,\n    json={\n        \"action\": \"send_sms\",\n        \"journey\": \"\
