    JourneyActionDetail:
      type: object
      properties:
        short_id:
          type: string
          nullable: true
          maxLength: 255
        action:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        values:
          type: object
          additionalProperties: {}
          nullable: true
        is_automatic:
          type: boolean
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/CompanyUser'
        parent_action:
          $ref: '#/components/schemas/ParentAction'
        dependants:
          type: string
          readOnly: true
        action_variables:
          type: string
          readOnly: true
        is_configured:
          type: string
          readOnly: true
        ancestors:
          type: string
          readOnly: true
        descendants:
          type: string
          readOnly: true
        group_actions:
          type: array
          items:
            $ref: '#/components/schemas/JourneyGroupAction'
        journey:
          type: string
          readOnly: true
      required:
      - action
      - action_variables
      - ancestors
      - dependants
      - descendants
      - group_actions
      - is_configured
      - journey
      - parent_action
    JourneyActionValidationError:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/ValuesErrors'
      required:
      - errors
    JourneyActionValue:
      type: object
      properties:
        value:
          type: string
        variables:
          type: object
          additionalProperties: {}
    JourneyGroupAction:
      type: object
      properties:
        short_id:
          type: string
          nullable: true
          maxLength: 255
        action:
          type: string
          maxLength: 200
        values:
          type: object
          additionalProperties: {}
