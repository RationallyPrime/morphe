  /v1/email-templates/:
    get:
      operationId: email_templates_list
      description: Retrieve a list of email templates
      summary: List
      tags:
      - email-templates
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailTemplate'
              examples:
                Example1:
                  value:
                  - shortId: 48181eab
                    name: Amazing template
                    subject: Some subject
                    content_html: <div>Some content</div>
                    container: null
                  summary: Example 1
          description: ''
        '404':
          description: Not found
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.get(\n    \"https://journeys.api.50skills.com/v1/email-templates/\"\
          ,\n)\nprint(response.json())\n                    "
    post:
      operationId: email_templates_create
      description: Create email template
      summary: Create
      tags:
      - email-templates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTemplate'
            examples:
              CreateEmailTemplateRequest:
                value:
                  name: Crazy template
                  subject: Ze subject
                  contentHtml: <div>Amazing, amazing.</div>
                summary: Create email template request
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
              examples:
                CreateEmailTemplateResponse:
                  value:
                    shortId: 48181eab
                    name: Crazy template
                    subject: Ze subject
                    contentHtml: <div>Amazing, amazing.</div>
                    container: null
                  summary: Create email template response
          description: ''
        '401':
          description: Unauthorized
      x-codeSamples:
      - lang: Python
        source: "\nimport requests\nresponse = requests.post(\n    \"https://journeys.api.50skills.com/v1/email-templates\"\
          ,\n    json={\n        \"name\": \"Crazy template\",\n        \"subject\"\
          : \"Ze subject\",\n        \"contentHtml\": \"<div>Amazing, amazing.</div>\"\
          ,\n    }\n)\nprint(response.json())\n                    "
  /v1/email-templates/{short_id}/:
    patch:
