<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="alternate icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#efebe3" />
		<!-- No static <title> here: it would render BEFORE %sveltekit.head% and ship a
		     SECOND title tag on every page (base first, the route's title second). A
		     browser honours the last, but crawlers/OG scrapers often read the first —
		     which would serve BASE copy on every paid `?cohort=` URL and defeat the SSR
		     cohort title. The default lives in the root +layout.svelte's <svelte:head>,
		     where SvelteKit dedupes it against a page's title (one tag, the page wins). -->
		<!-- The Icelandic Archive type system: Spectral (display — a humanist old-style
		     serif in the Garamond/Plantin lineage; the philosophy-press / archive
		     register, sturdy not glam) + Hanken Grotesk (body) + Fragment Mono (folio /
		     plate / label apparatus), and Material Symbols for glyphs. Loaded once here
		     so every route inherits them. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600;700&family=Fragment+Mono:ital@0;1&display=swap"
		/>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
