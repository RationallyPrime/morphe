# Morphe CI — the mechanical gate behind the two-agent assembly line.
#
# Two parallel jobs mirror the two stacks; every command here is exactly what
# the repo runs locally (CONTRACT §1 gates + the py/ Astral gates), so a green
# check means "the gates a human would have run by hand all passed".
#
# The SSR route smoke exists because of a real incident: a factory-gate
# tightening landed green on types+tests while every marketing page 500'd at
# SSR (compound registration happens at route-render time). Tests can miss
# that class; curling the routes cannot.
#
# The schema byte-stability step is the seed of the R3.2 parity gate: the
# committed schema/morphe-grammar.schema.json artifact must always equal a
# fresh emission, or codegen consumers drift from the Pydantic source.

name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (svelte-check · vitest · build · SSR smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Lint + format (Biome)
        run: bunx biome ci .

      - name: Types (svelte-check, 0 errors / 0 warnings)
        run: bun run check

      - name: Tests (vitest)
        run: bun run test

      - name: Build (vite, adapter-vercel)
        run: bun run build

      - name: SSR route smoke (Morphe host renders, no 500s)
        run: |
          bun run dev --port 4173 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:4173/ && break
            sleep 1
          done
          fail=0
          for route in / /substrate /preview/capability-page.demo/rev-001 /p/demo; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4173$route")
            echo "$route -> $code"
            [ "$code" = "200" ] || fail=1
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4173/dignity")
          echo "/dignity -> $code"
          [ "$code" = "308" ] || fail=1
          # Content markers: an error page can still be a 200 shell; assert the
          # real SSR'd copy is present.
          curl -s http://localhost:4173/ | grep -q "A typed adaptive-interface workbench" || fail=1
          curl -s http://localhost:4173/substrate | grep -q "Substrate under live pressure" || fail=1
          curl -s http://localhost:4173/preview/capability-page.demo/rev-001 | grep -q "Published as data" || fail=1
          curl -s http://localhost:4173/p/demo | grep -q "Published as data" || fail=1
          exit $fail

      - name: Viewer types (svelte-check, 0 errors / 0 warnings)
        run: bun run viewer:check

      - name: Viewer build (adapter-node, the appliance shape)
        run: bun run viewer:build:node

      - name: Viewer SSR smoke (stripped app · fail-closed grammar gate)
        run: |
          node scripts/stub-artifact-store.mjs &
          PORT=4174 MORPHE_ARTIFACT_BASE_URL=http://127.0.0.1:4399/api/v1/surfaces \
            node viewer/build/index.js &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:4174/healthz && break
            sleep 1
          done
          fail=0
          # /healthz reports the supported grammar_version (deploy-to-box asserts this).
          curl -s http://localhost:4174/healthz | grep -q '"grammar_version":"0.1.0"' || fail=1
          # A real artifact SSRs (200 + the SSR'd copy, not just a 200 shell).
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/surfaces/surface:capability-page:run-42")
          echo "/surfaces/run-42 -> $code"
          [ "$code" = "200" ] || fail=1
          curl -s "http://localhost:4174/surfaces/surface:capability-page:run-42" | grep -q "Served from the artifact store" || fail=1
          # ?dialect= override stays a 200 render.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/surfaces/surface:capability-page:run-42?dialect=night")
          echo "/surfaces/run-42?dialect=night -> $code"
          [ "$code" = "200" ] || fail=1
          # Unsupported grammar_version fails CLOSED: 409 diagnostic naming both versions.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/surfaces/surface:capability-page:run-drift")
          echo "/surfaces/run-drift -> $code"
          [ "$code" = "409" ] || fail=1
          drift=$(curl -s "http://localhost:4174/surfaces/surface:capability-page:run-drift")
          echo "$drift" | grep -q "Unsupported grammar version" || fail=1
          echo "$drift" | grep -q "9.9.9" || fail=1
          echo "$drift" | grep -q "0.1.0" || fail=1
          # Unknown artifact is a 404, and the playground's adaptive surface is ABSENT.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/surfaces/surface:missing:one")
          echo "/surfaces/missing -> $code"
          [ "$code" = "404" ] || fail=1
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:4174/api/adaptive/decision)
          echo "/api/adaptive/decision -> $code (must be 404: stripped image)"
          [ "$code" = "404" ] || fail=1
          exit $fail

  python:
    name: python (pytest · ruff · ty · schema stability)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev --extra service

      - name: Tests (pytest)
        run: uv run pytest

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Types (ty)
        run: uv run ty check

      - name: Schema artifacts are byte-stable
        run: |
          uv run python -m morphe_grammar.artifacts --check
          uv run python -m morphe_cms.schema --check
