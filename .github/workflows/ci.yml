# Morphe CI — the mechanical gate behind the two-agent assembly line.
#
# Two parallel jobs mirror the two stacks; every command here is exactly what
# the repo runs locally (CONTRACT §1 gates + the py/ Astral gates), so a green
# check means "the gates a human would have run by hand all passed".
#
# The SSR route smoke exists because of a real incident: a factory-gate
# tightening landed green on types+tests while every marketing page 500'd at
# SSR (compound registration happens at route-render time). Tests can miss
# that class; curling the routes cannot.
#
# The schema byte-stability step is the seed of the R3.2 parity gate: the
# committed schema/morphe-grammar.schema.json artifact must always equal a
# fresh emission, or codegen consumers drift from the Pydantic source.

name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (svelte-check · vitest · build · SSR smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Install compiler-renderer contract browsers
        run: bunx playwright install --with-deps chromium firefox

      - name: Verify compiler build identity
        run: bun run compiler-id:check

      - name: Lint + format (Biome)
        run: bunx biome ci .

      - name: Types (svelte-check, 0 errors / 0 warnings)
        run: bun run check

      - name: Tests (vitest)
        run: bun run test

      - name: Build (vite, adapter-vercel)
        run: bun run build

      - name: SSR route smoke (Morphe host renders, no 500s)
        run: |
          bun run dev --port 4173 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:4173/ && break
            sleep 1
          done
          fail=0
          for route in / /substrate /preview/capability-page.demo/rev-001 /p/demo; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4173$route")
            echo "$route -> $code"
            [ "$code" = "200" ] || fail=1
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4173/dignity")
          echo "/dignity -> $code"
          [ "$code" = "308" ] || fail=1
          # Content markers: an error page can still be a 200 shell; assert the
          # real SSR'd copy is present.
          curl -s http://localhost:4173/ | grep -q "A typed adaptive-interface workbench" || fail=1
          curl -s http://localhost:4173/substrate | grep -q "Substrate under live pressure" || fail=1
          curl -s http://localhost:4173/preview/capability-page.demo/rev-001 | grep -q "Published as data" || fail=1
          curl -s http://localhost:4173/p/demo | grep -q "Published as data" || fail=1
          exit $fail

      - name: Viewer types (svelte-check, 0 errors / 0 warnings)
        run: bun run viewer:check

      - name: Viewer build (adapter-node, the appliance shape)
        run: bun run viewer:build:node

      - name: Viewer SSR smoke (stripped app · fail-closed trust + retirement gates)
        env:
          MORPHE_SOURCES: >-
            {"taxis":{"kind":"kernel","title":"Taxis fixture","base_url":"http://127.0.0.1:4401","source_trust":{"issuer":"taxis","public_keys":{"taxis-fixture-2026-01":"11qYAYKxCrfVS_7TyWQHOg7hcvPapiMlrwIaaPcHURo"},"max_age_seconds":3153600000},"surfaces":[{"id":"roster","title":"Weekly roster","path":"/source/taxis-roster","representation":"source-v1","surface_id":"taxis.roster:westfjords:2026-W29"},{"id":"roster-wrong-pin","title":"Wrong identity pin","path":"/source/taxis-roster","representation":"source-v1","surface_id":"taxis.roster:someone-else:2026-W29"}]}}
          # A config that still declares the retired legacy representation must
          # fail the whole source CLOSED (KRA-775 Stage 5) — asserted on a
          # second viewer instance so the assertion is deliberate, not a side
          # effect of breaking the main fixture.
          MORPHE_SOURCES_LEGACY_DECLARATION: >-
            {"taxis":{"kind":"kernel","title":"Taxis fixture","base_url":"http://127.0.0.1:4401","source_trust":{"issuer":"taxis","public_keys":{"taxis-fixture-2026-01":"11qYAYKxCrfVS_7TyWQHOg7hcvPapiMlrwIaaPcHURo"},"max_age_seconds":3153600000},"surfaces":[{"id":"roster","title":"Weekly roster","path":"/legacy/taxis-roster","representation":"legacy"}]}}
        run: |
          node scripts/stub-source-surface-store.mjs &
          source_store_pid=$!
          PORT=4174 node viewer/build/index.js &
          viewer_pid=$!
          MORPHE_SOURCES="$MORPHE_SOURCES_LEGACY_DECLARATION" PORT=4175 node viewer/build/index.js &
          legacy_viewer_pid=$!
          trap 'kill "$source_store_pid" "$viewer_pid" "$legacy_viewer_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:4174/healthz \
              && curl -sf -o /dev/null http://localhost:4175/healthz && break
            sleep 1
          done
          fail=0
          # /healthz reports the supported generated grammar contract. Derive the
          # expectation from the same checked-in authority so a grammar bump cannot
          # leave this smoke test pinned to the previous release.
          expected_grammar_version=$(bun -e 'import { GRAMMAR_VERSION } from "./src/lib/grammar/version.ts"; process.stdout.write(GRAMMAR_VERSION)')
          curl -s http://localhost:4174/healthz \
            | grep -q "\"grammar_version\":\"${expected_grammar_version}\"" || fail=1
          curl -s http://localhost:4174/healthz | grep -q '"edge_compiler_version":"0.3.6"' || fail=1
          curl -s http://localhost:4174/healthz | grep -q '"compiler_build_sha256":"sha256:' || fail=1
          curl -s http://localhost:4174/healthz | grep -q '"source_surface_wire_version":"1.0"' || fail=1
          # The production adapter-node build serves the source-v1 path (200 +
          # the SSR'd testimony content, not just a 200 shell).
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/s/taxis/roster")
          echo "/s/taxis/roster -> $code"
          [ "$code" = "200" ] || fail=1
          source_html=$(curl -s "http://localhost:4174/s/taxis/roster")
          echo "$source_html" | grep -q "TAXIS_ROW_REVIEW" || fail=1
          echo "$source_html" | grep -q 'data-source-testimony-sha256="sha256:' || fail=1
          # ?dialect= override stays a 200 render on the source-v1 path.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/s/taxis/roster?dialect=night")
          echo "/s/taxis/roster?dialect=night -> $code"
          [ "$code" = "200" ] || fail=1
          # Admission fails CLOSED: a declared surface_id pin that does not match
          # the signed concrete identity is a 502 trust-gate diagnostic.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/s/taxis/roster-wrong-pin")
          echo "/s/taxis/roster-wrong-pin -> $code"
          [ "$code" = "502" ] || fail=1
          curl -s "http://localhost:4174/s/taxis/roster-wrong-pin" | grep -q "failed its trust gate" || fail=1
          # RETIREMENT (KRA-775 Stage 5): the legacy store route is deleted —
          # /surfaces/<anything> is a 404, never a reader.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/surfaces/surface:capability-page:run-42")
          echo "/surfaces/run-42 -> $code (must be 404: store reader retired)"
          [ "$code" = "404" ] || fail=1
          # RETIREMENT (KRA-775 Stage 5): a config declaring the legacy
          # representation fails the whole source closed with the retirement error.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4175/s/taxis/roster")
          echo "legacy-declaration viewer /s/taxis/roster -> $code (must be 503: legacy declaration fails closed)"
          [ "$code" = "503" ] || fail=1
          curl -s "http://localhost:4175/s/taxis/roster" | grep -q "legacy representation is retired (KRA-775 Stage 5)" || fail=1
          # Unknown surface is a 404, and the playground's adaptive surface is ABSENT.
          code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4174/s/taxis/missing")
          echo "/s/taxis/missing -> $code"
          [ "$code" = "404" ] || fail=1
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:4174/api/adaptive/decision)
          echo "/api/adaptive/decision -> $code (must be 404: stripped image)"
          [ "$code" = "404" ] || fail=1
          exit $fail

      - name: Edge source compiler-renderer contract (Chromium + Firefox)
        run: bun run test:edge-e2e

      - name: WCAG 2.2 AA contrast matrix + composed a11y (Chromium + Firefox)
        # Browser-computed contrast over every dialect x base/raised/sunken after
        # var()/color-mix() resolution, plus reflow/zoom/keyboard/forced-colors/
        # reduced-motion on the composed surface (KRA-796 Defect 3).
        run: bun run test:contrast

  python:
    name: python (pytest · ruff · ty · schema stability)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev --extra service

      - name: Tests (pytest)
        run: uv run pytest

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Types (ty)
        run: uv run ty check

      - name: Schema artifacts are byte-stable
        run: |
          uv run python -m morphe_grammar.artifacts --check
          uv run python -m morphe_surface.artifacts --check
          uv run python -m morphe_cms.schema --check

      - name: Python package carries installed decoder masks
        run: uv run python scripts/verify-python-package.py
