name: Publish package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "package.json"
      - "bun.lock"
      - "src/lib/**"
      - "scripts/pack-verify.ts"
      - ".github/workflows/publish.yml"

permissions:
  contents: read
  id-token: write

jobs:
  dry-run:
    name: package dry-run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Full local gates
        run: |
          bun run lint
          bun run check
          bun run test
          bun run build
          bun run pack:verify

      - name: Build package
        run: bun run package

      - name: Dry-run publish
        run: npm publish --dry-run --access public

  publish:
    name: publish v-tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Full local gates
        run: |
          bun run lint
          bun run check
          bun run test
          bun run build
          bun run pack:verify

      - name: Build package
        run: bun run package

      - name: Publish to npm (trusted publishing, no token)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@rationallyprime/morphe@${VERSION}" version >/dev/null 2>&1; then
            echo "::notice::@rationallyprime/morphe@${VERSION} is already on npmjs; skipping publish."
            exit 0
          fi
          # OIDC trusted publishing requires npm >= 11.5.1; runners bundle an older npm.
          npm install -g npm@latest
          npm publish --access public
